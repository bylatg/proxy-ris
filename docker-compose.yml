services:
  postgres:
    image: postgres:16
    container_name: proxy_ris_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: proxy_ris_app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             python -m scripts.create_admin &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  mitmproxy:
    image: mitmproxy/mitmproxy:latest
    container_name: proxy_ris_mitm
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ./proxy_addon.py:/home/mitmproxy/project/proxy_addon.py:ro
      - ./.mitmproxy:/home/mitmproxy/.mitmproxy
    working_dir: /home/mitmproxy/project
    environment:
      PROXY_BACKEND_BASE_URL: "http://app:8000"
      PROXY_INTERNAL_TOKEN: ${INTERNAL_API_TOKEN}
      PROXY_APP_ID: "1"
      PROXY_CACHE_TTL_SECONDS: "5"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    command: >
      mitmweb
      --set block_global=false
      --set listen_host=0.0.0.0
      --set listen_port=8080
      --set web_host=0.0.0.0
      --set web_port=8081
      --set web_password=RabotaAdmin123
      -s /home/mitmproxy/project/proxy_addon.py

volumes:
  postgres_data:
