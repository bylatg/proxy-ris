{% extends "base.html" %}

{% block body %}
<div class="max-w-5xl mx-auto p-4">

    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-xl font-bold">Приложения</h1>

        <form method="post" action="/logout">
            <button class="btn btn-sm btn-outline">Выйти</button>
        </form>
    </div>

    <!-- Apps list -->
    <div class="space-y-3">
        {% for app in apps %}
        <div class="card bg-base-100 shadow">
            <div class="card-body">

                <div class="flex justify-between items-start gap-3">
                    <div>
                        <div class="font-semibold text-lg">{{ app.name }}</div>
                        <div class="text-sm opacity-70">slug: {{ app.slug }}</div>
                        <div class="text-sm mt-1">{{ app.description or "Без описания" }}</div>
                    </div>
                </div>

                <div class="flex gap-2 mt-4 flex-wrap">
                    <a href="/apps/{{ app.id }}/rules/" class="btn btn-primary btn-sm">Правила</a>
                    <a href="/apps/{{ app.id }}/templates/" class="btn btn-outline btn-sm">Шаблоны</a>
                </div>

            </div>
        </div>
        {% endfor %}
    </div>

</div>
{% endblock %}
